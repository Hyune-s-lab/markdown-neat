name: Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  renderer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Check renderer
        run: |
          npm ci
          npm run typecheck:renderer
          npm run test:renderer
          npm run build:mermaid-runtime
          npm run test:mermaid-runtime
          npm run build:renderer
